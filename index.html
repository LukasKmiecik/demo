<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo serwisowe 3D - Budynek</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="gora">
    <div>
      <h1>Demo systemu serwisowego 3D</h1>
      <p class="podtytul">Etap 1: budynek jako obiekt z modelem 3D i panelem informacji</p>
    </div>
    <div class="akcje">
      <button id="resetKameryBtn" type="button">Reset widoku</button>
      <button id="pokazCalyModelBtn" type="button">Pokaż cały model</button>
    </div>
  </header>

  <main class="uklad">
    <section class="panel-modelu">
      <div class="pasek-statusu">
        <span id="statusModelu">Ładowanie modelu...</span>
      </div>
      <div id="viewer3d" aria-label="Widok modelu 3D"></div>
      <div class="instrukcja">
        <strong>Sterowanie:</strong> lewy przycisk myszy obrót, rolka przybliżenie, prawy przycisk przesunięcie.
      </div>
    </section>

    <aside class="panel-informacji">
      <div class="karta">
        <h2 id="nazwaObiektu">Obiekt</h2>
        <p id="opisObiektu" class="opis"></p>
      </div>

      <div class="karta">
        <h3>Dane podstawowe</h3>
        <dl class="lista-danych" id="danePodstawowe"></dl>
      </div>

      <div class="karta">
        <h3>Serwis i kontakt</h3>
        <dl class="lista-danych" id="daneKontaktowe"></dl>
      </div>

      <div class="karta">
        <h3>Dostęp i bezpieczeństwo</h3>
        <dl class="lista-danych" id="daneDostepu"></dl>
      </div>

      <div class="karta">
        <h3>Notatki</h3>
        <ul id="notatkiLista" class="lista-notatek"></ul>
      </div>
    </aside>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
